<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>

  <!-- Passport stamp circle (decorative ring) -->
  <circle cx="32" cy="32" r="26" stroke="#2563eb" stroke-width="2" stroke-dasharray="4 3" fill="none" opacity="0.5"/>

  <!-- LDR text -->
  <text
    x="32" y="26"
    font-family="Arial, sans-serif"
    font-weight="900"
    font-size="16"
    fill="white"
    text-anchor="middle"
    letter-spacing="1"
  >LDR</text>

  <!-- Divider line -->
  <line x1="18" y1="30" x2="46" y2="30" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>

  <!-- VISA text -->
  <text
    x="32" y="43"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="11"
    fill="#60a5fa"
    text-anchor="middle"
    letter-spacing="3"
  >VISA</text>
</svg>
